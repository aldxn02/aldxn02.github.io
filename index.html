<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FiveM Regelwerk</title>

  <style>
    html{
      scroll-behavior:smooth;
    }

    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#0f172a;
      color:white;
    }

    nav{
      position:fixed;
      width:100%;
      top:0;
      background:rgba(15,23,42,0.9);
      backdrop-filter:blur(10px);
      padding:20px;
      z-index:1000;
    }

    nav ul{
      display:flex;
      justify-content:center;
      gap:30px;
      list-style:none;
      margin:0;
      padding:0;
    }

    nav a{
      color:white;
      text-decoration:none;
      font-weight:bold;
      transition:0.3s;
    }

    nav a:hover{
      color:#60a5fa;
    }

    section{
      min-height:100vh;
      padding:120px 80px;
      opacity:0;
      transform:translateY(50px);
      transition:all 1s ease;
    }

    section.show{
      opacity:1;
      transform:translateY(0);
    }

    .box{
      background:#1e293b;
      padding:40px;
      border-radius:20px;
      box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    h1{
      color:#60a5fa;
    }
  </style>
</head>
<body>

  <nav>
    <ul>
      <li><a href="#allgemein">Allgemein</a></li>
      <li><a href="#rp">RP Regeln</a></li>
      <li><a href="#crime">Crime</a></li>
      <li><a href="#support">Support</a></li>
    </ul>
  </nav>

  <section id="allgemein">
    <div class="box">
      <h1>📜 Allgemeine Regeln</h1>
      <p>Respektvoller Umgang ist Pflicht.</p>
    </div>
  </section>

  <section id="rp">
    <div class="box">
      <h1>🎭 RP Regeln</h1>
      <p>FailRP, MetaGaming und PowerRP sind verboten.</p>
    </div>
  </section>

  <section id="crime">
    <div class="box">
      <h1>🔫 Crime Regeln</h1>
      <p>Keine unrealistischen Überfälle.</p>
    </div>
  </section>

  <section id="support">
    <div class="box">
      <h1>📞 Support</h1>
      <p>Supporter Entscheidungen sind zu respektieren.</p>
    </div>
  </section>

  <script>
    const sections = document.querySelectorAll("section");

    window.addEventListener("scroll", () => {
      sections.forEach(section => {
        const position = section.getBoundingClientRect().top;
        const screenPosition = window.innerHeight / 1.3;

        if(position < screenPosition){
          section.classList.add("show");
        }
      });
    });
  </script>

</body>
</html>
